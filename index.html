<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสร้างฟอร์แมตรายงานส่ง LINE</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Vue.js (ใช้สำหรับจัดการ Logic แบบเดียวกับ React ในไฟล์เดียว) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Sarabun', sans-serif;
        }
        .preview-container {
            scrollbar-width: thin;
            scrollbar-color: #8b9dc3 #abc1d1;
        }
        .preview-container::-webkit-scrollbar {
            width: 6px;
        }
        .preview-container::-webkit-scrollbar-thumb {
            background-color: #8b9dc3;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="p-4 md:p-6 lg:p-8">
        <div class="max-w-6xl mx-auto">
            
            <!-- Header -->
            <div class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-gray-800">ระบบสร้างฟอร์แมตรายงานส่ง LINE</h1>
                    <p class="text-gray-500 text-xs md:text-sm mt-1">กรอกข้อมูลด้านซ้าย ข้อความจะถูกจัดรูปแบบอัตโนมัติด้านขวา</p>
                </div>
                <button 
                    @click="clearForm"
                    class="flex items-center gap-2 px-4 py-2 text-sm text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 transition-colors shadow-sm w-full sm:w-auto justify-center"
                >
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> ล้างข้อมูล
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8">
                
                <!-- Left: Form -->
                <div class="lg:col-span-7 space-y-6">
                    <div class="bg-white p-5 md:p-6 rounded-xl shadow-sm border border-gray-100">
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1.5">รหัสสาขา / หัวรายงาน</label>
                                <input v-model="form.branchHeader" type="text" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold text-blue-800">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1.5">1. ชื่อลูกค้า</label>
                                <input v-model="form.customerName" type="text" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="เช่น คุณกำพล ปรางค์ศรีทอง">
                            </div>
                        </div>

                        <!-- 2. รายการสินค้า -->
                        <div class="mb-6">
                            <label class="block text-sm font-semibold text-gray-700 mb-2">2. รายการสินค้าที่ซื้อ</label>
                            <div class="space-y-2">
                                <div v-for="(item, index) in form.items" :key="index" class="flex items-center gap-2">
                                    <input v-model="form.items[index]" type="text" class="flex-1 p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm" placeholder='เช่น ทีวี ขนาด 85" จำนวน 1 EA'>
                                    <button @click="removeItem('items', index)" class="p-2.5 text-red-500 hover:bg-red-50 rounded-lg flex-shrink-0">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                                <button @click="addItem('items')" class="flex items-center gap-1 text-sm text-blue-600 font-medium hover:bg-blue-50 px-2 py-1 rounded">
                                    <i data-lucide="plus" class="w-4 h-4"></i> เพิ่มรายการ
                                </button>
                            </div>
                        </div>

                        <!-- 3. หน้างาน -->
                        <div class="mb-6">
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">3. ประเภทหน้างาน</label>
                            <textarea v-model="form.jobSite" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm resize-none" rows="2" placeholder="เช่น บ้านพักอาศัย หมู่บ้าน..."></textarea>
                        </div>

                        <!-- 4. พนักงาน -->
                        <div class="mb-6">
                            <label class="block text-sm font-semibold text-gray-700 mb-2">4. พนง.ผู้รับผิดชอบดูแลลูกค้า</label>
                            <div class="space-y-2">
                                <div v-for="(emp, index) in form.employees" :key="index" class="flex items-center gap-2">
                                    <input v-model="form.employees[index]" type="text" class="flex-1 p-2.5 border border-gray-300 rounded-lg text-sm" placeholder="เช่น นิวัฒน์ พงษ์สุวรรณ B2B3">
                                    <button @click="removeItem('employees', index)" class="p-2.5 text-red-500 hover:bg-red-50 rounded-lg">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                                <button @click="addItem('employees')" class="flex items-center gap-1 text-sm text-blue-600 font-medium hover:bg-blue-50 px-2 py-1 rounded">
                                    <i data-lucide="plus" class="w-4 h-4"></i> เพิ่มรายการ
                                </button>
                            </div>
                        </div>

                        <!-- 5. ราคา/โปร -->
                        <div class="mb-6">
                            <label class="block text-sm font-semibold text-gray-700 mb-2">5. ราคาที่ใช้ปิดการขาย (โปรโมชั่น)</label>
                            <div class="space-y-2">
                                <div v-for="(pro, index) in form.promotions" :key="index" class="flex items-center gap-2">
                                    <input v-model="form.promotions[index]" type="text" class="flex-1 p-2.5 border border-gray-300 rounded-lg text-sm" placeholder="เช่น โปรส่วนลดสมาชิก Home Card 1,500 - ส่วนลด Vendor YI1013=3000">
                                    <button @click="removeItem('promotions', index)" class="p-2.5 text-red-500 hover:bg-red-50 rounded-lg">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                                <button @click="addItem('promotions')" class="flex items-center gap-1 text-sm text-blue-600 font-medium hover:bg-blue-50 px-2 py-1 rounded">
                                    <i data-lucide="plus" class="w-4 h-4"></i> เพิ่มรายการ
                                </button>
                            </div>
                        </div>

                        <!-- 6. ชำระเงิน (แบบเพิ่มรายการ) -->
                        <div class="mb-6">
                            <label class="block text-sm font-semibold text-gray-700 mb-2">6. ประเภทการชำระเงิน</label>
                            <div class="space-y-2">
                                <div v-for="(pay, index) in form.paymentType" :key="index" class="flex items-center gap-2">
                                    <input v-model="form.paymentType[index]" type="text" class="flex-1 p-2.5 border border-gray-300 rounded-lg text-sm" placeholder="เช่น ชำระแบบผ่อน 0% 10 เดือน บัตรเครดิตกรุงศรีโฮมโปรวีซ่า ลดเพิ่ม 3%">
                                    <button @click="removeItem('paymentType', index)" class="p-2.5 text-red-500 hover:bg-red-50 rounded-lg">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                                <button @click="addItem('paymentType')" class="flex items-center gap-1 text-sm text-blue-600 font-medium hover:bg-blue-50 px-2 py-1 rounded">
                                    <i data-lucide="plus" class="w-4 h-4"></i> เพิ่มรายการ
                                </button>
                            </div>
                        </div>

                        <div class="mb-6">
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">7. เป็นลูกค้าประเภทใด</label>
                            <input v-model="form.customerType" type="text" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm" placeholder="เช่น ลูกค้าไม่ได้เป็น Commercial เป็นลุกค้า End User ซื้อของเข้าบ้าน">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">8. โอกาสการขายสินค้าเพิ่ม</label>
                            <input v-model="form.upsell" type="text" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm" placeholder="เช่น นำเสนอ สินค้ากลุ่ม MC PB">
                        </div>
                    </div>
                </div>

                <!-- Right: Preview -->
                <div class="lg:col-span-5 relative">
                    <div class="sticky top-6">
                        <div class="bg-[#8b9dc3] rounded-t-xl p-3 text-white font-semibold flex justify-between items-center shadow-md">
                            <span class="text-sm md:text-base">พรีวิวข้อความ (LINE)</span>
                            <div class="flex items-center gap-2">
                                <button
                                    @click="sendToLine"
                                    class="flex items-center gap-1.5 md:gap-2 px-2.5 md:px-3 py-1.5 rounded-lg text-xs md:text-sm font-medium transition-all bg-[#00B900] text-white hover:bg-[#009900] shadow-sm"
                                >
                                    <i data-lucide="send" class="w-4 h-4"></i>
                                    ส่งเข้าไลน์
                                </button>
                                <button
                                    @click="copyToClipboard"
                                    :class="isCopied ? 'bg-green-500 text-white' : 'bg-white text-[#8b9dc3] hover:bg-gray-100'"
                                    class="flex items-center gap-1.5 md:gap-2 px-2.5 md:px-3 py-1.5 rounded-lg text-xs md:text-sm font-medium transition-all"
                                >
                                    <i v-if="isCopied" data-lucide="check-circle-2" class="w-4 h-4"></i>
                                    <i v-else data-lucide="copy" class="w-4 h-4"></i>
                                    {{ isCopied ? 'คัดลอกแล้ว!' : 'คัดลอกข้อความ' }}
                                </button>
                            </div>
                        </div>
                        <div class="bg-[#abc1d1] p-3 md:p-4 rounded-b-xl shadow-md min-h-[350px] max-h-[60vh] lg:max-h-none lg:h-[calc(100vh-160px)] lg:min-h-[500px] overflow-y-auto preview-container">
                            <div class="bg-white rounded-[16px] md:rounded-[20px] p-4 md:p-5 whitespace-pre-wrap font-sans text-[14px] md:text-[15px] text-gray-800 shadow-sm leading-[1.6]">
                                {{ generatedText }}
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const isCopied = ref(false);
                const form = ref({
                    branchHeader: 'S055-CTR',
                    customerName: '',
                    items: [''],
                    jobSite: '',
                    employees: [''],
                    promotions: [''],
                    paymentType: [''],
                    customerType: '',
                    upsell: ''
                });

                const addItem = (key) => {
                    form.value[key].push('');
                    nextTick(() => lucide.createIcons());
                };

                const removeItem = (key, index) => {
                    form.value[key].splice(index, 1);
                    if (form.value[key].length === 0) form.value[key].push('');
                    nextTick(() => lucide.createIcons());
                };

                const clearForm = () => {
                    if(confirm('คุณต้องการล้างข้อมูลทั้งหมดใช่หรือไม่?')) {
                        form.value = {
                            branchHeader: 'S055-CTR',
                            customerName: '',
                            items: [''],
                            jobSite: '',
                            employees: [''],
                            promotions: [''],
                            paymentType: [''],
                            customerType: '',
                            upsell: ''
                        };
                    }
                };

                const generatedText = computed(() => {
                    let text = `${form.value.branchHeader} รายงานลูกค้ารายใหญ่\n`;
                    text += `1. ชื่อลูกค้า\n   ${form.value.customerName || '-'}\n\n`;
                    
                    const formatList = (label, list) => {
                        let str = `${label}\n`;
                        const filled = list.filter(i => i.trim() !== '');
                        if (filled.length > 0) {
                            filled.forEach(i => { str += `  - ${i}\n`; });
                        } else {
                            str += `  -\n`;
                        }
                        return str + `\n`;
                    };

                    text += formatList(`2.รายการสินค้าที่ซื้อ`, form.value.items);
                    text += `3.ประเภทหน้างาน\n  - ${form.value.jobSite || '-'}\n\n`;
                    text += formatList(`4. พนง.ผู้รับผิดชอบดูแลลูกค้า`, form.value.employees);
                    text += formatList(`5. ราคาที่ใช้ปิดการขาย`, form.value.promotions);
                    text += formatList(`6. ประเภทการ ชำระเงิน`, form.value.paymentType);
                    text += `7.เป็นลูกค้า\n  - ${form.value.customerType || '-'}\n\n`;
                    text += `8.โอกาสการขายสินค้าเพิ่ม\n  - ${form.value.upsell || '-'}`;

                    return text;
                });

                const sendToLine = () => {
                    const encodedText = encodeURIComponent(generatedText.value);
                    window.open(`https://line.me/R/msg/text/?${encodedText}`, '_blank');
                };

                const copyToClipboard = () => {
                    const el = document.createElement('textarea');
                    el.value = generatedText.value;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    
                    isCopied.value = true;
                    nextTick(() => lucide.createIcons());
                    
                    setTimeout(() => {
                        isCopied.value = false;
                        nextTick(() => lucide.createIcons());
                    }, 2000);
                };

                onMounted(() => {
                    lucide.createIcons();
                });

                return {
                    form, isCopied, generatedText,
                    addItem, removeItem, clearForm, copyToClipboard, sendToLine
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
